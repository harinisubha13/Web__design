<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco-Dine Premium</title><style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#e8f5e9,#ffffff);
}

/* NAV */
nav {
  background:#1b5e20;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* MENU GRID */
.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card {
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body {
  padding:10px;
}

.price {
  color:#2e7d32;
  font-weight:bold;
}

button {
  width:100%;
  padding:8px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* CART */
.cart {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:15px;
  transition:0.3s;
  box-shadow:-3px 0 10px rgba(0,0,0,0.2);
}
.cart.open { right:0; }

/* PENGUIN */
.penguin {
  position:fixed;
  bottom:20px;
  left:20px;
  font-size:50px;
  animation:float 3s infinite;
}

@keyframes float {
  50% { transform:translateY(-10px); }
}
</style></head><body><nav>
  <h2>🌿 Eco-Dine</h2>
  <div onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</div>
</nav><div class="menu" id="menu"></div><div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
</div><div class="penguin" id="penguin">🐧</div><script>

const menuItems = [
{name:"Pizza",price:250,img:"https://images.unsplash.com/photo-1601924582975-7e8b1b2b4f3c?auto=format&fit=crop&w=400"},
{name:"Burger",price:180,img:"https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=400"},
{name:"Sandwich",price:120,img:"https://images.unsplash.com/photo-1553909489-cd47e0ef937f?auto=format&fit=crop&w=400"},
{name:"Momos",price:110,img:"https://images.unsplash.com/photo-1625944525903-b0a9d0d9c9d6?auto=format&fit=crop&w=400"},
{name:"Fried Rice",price:150,img:"https://images.unsplash.com/photo-1603133872878-684f208fb84b?auto=format&fit=crop&w=400"},
{name:"Donut",price:80,img:"https://images.unsplash.com/photo-1505253213348-cd54c840f1f0?auto=format&fit=crop&w=400"}
];

let cart = {};

function render(){
 let html="";
 menuItems.forEach((item,i)=>{
  html+=`
  <div class="card">
    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x300'">
    <div class="card-body">
      <h3>${item.name}</h3>
      <p class="price">₹${item.price}</p>
      <button onclick="add(${i})">Add</button>
    </div>
  </div>`;
 });
 document.getElementById("menu").innerHTML=html;
}

function add(i){
 cart[i]=(cart[i]||0)+1;
 updateCart();
 penguinReact();
}

function updateCart(){
 let total=0,html="";
 for(let i in cart){
  total+=menuItems[i].price*cart[i];
  html+=`<p>${menuItems[i].name} x${cart[i]}</p>`;
 }
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText=total;
 document.getElementById("count").innerText=
  Object.values(cart).reduce((a,b)=>a+b,0);
}

function toggleCart(){
 document.getElementById("cart").classList.toggle("open");
}

function penguinReact(){
 let p=document.getElementById("penguin");
 p.innerHTML="😄🐧";
 setTimeout(()=>p.innerHTML="🐧",1000);
}

render();

</script></body>
</html>
