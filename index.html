<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco-Dine SH</title><style>
body {
  margin:0;
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#e8f5e9,#ffffff);
}

/* NAV */
nav {
  background:#1b5e20;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-weight:bold;
  font-size:20px;
}

.sh {
  font-family:cursive;
  font-size:18px;
  color:#ffd700;
}

/* MENU */
.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}
.card:hover { transform:scale(1.05); }

.card img {
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body { padding:10px; }

.price { color:#2e7d32; font-weight:bold; }

button {
  width:100%;
  padding:8px;
  background:#2e7d32;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* CART */
.cart {
  position:fixed;
  right:-320px;
  top:0;
  width:300px;
  height:100%;
  background:white;
  padding:15px;
  transition:0.3s;
}
.cart.open { right:0; }

/* 🧚 FAIRY */
.fairy {
  position:fixed;
  top:80px;
  right:20px;
  font-size:40px;
  animation:fly 4s infinite;
}

.wand {
  font-size:20px;
  display:block;
  text-align:center;
}

@keyframes fly {
  0%{transform:translateY(0)}
  50%{transform:translateY(-20px)}
  100%{transform:translateY(0)}
}

.blink {
  animation:blink 0.5s;
}

@keyframes blink {
  0%{opacity:1}
  50%{opacity:0}
  100%{opacity:1}
}
</style></head><body><nav>
  <div class="logo">🌿 Eco-Dine <span class="sh">SH</span></div>
  <div onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</div>
</nav><div class="menu" id="menu"></div><div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4>Total: ₹<span id="total">0</span></h4>
</div><!-- 🧚 Fairy --><div class="fairy" id="fairy">
  🧚‍♀️
  <span class="wand" id="wand">✨</span>
</div><script>

const menuItems = [
{name:"Pizza",price:250,img:"https://images.unsplash.com/photo-1601924582975-7e8b1b2b4f3c?auto=format&fit=crop&w=400"},
{name:"Burger",price:180,img:"https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=400"},
{name:"Sandwich",price:120,img:"https://images.unsplash.com/photo-1553909489-cd47e0ef937f?auto=format&fit=crop&w=400"},
{name:"Momos",price:110,img:"https://images.unsplash.com/photo-1625944525903-b0a9d0d9c9d6?auto=format&fit=crop&w=400"},
{name:"Fried Rice",price:150,img:"https://images.unsplash.com/photo-1603133872878-684f208fb84b?auto=format&fit=crop&w=400"},
{name:"Donut",price:80,img:"https://images.unsplash.com/photo-1505253213348-cd54c840f1f0?auto=format&fit=crop&w=400"},
{name:"Pasta",price:200,img:"https://images.unsplash.com/photo-1525755662778-989d0524087e?auto=format&fit=crop&w=400"},
{name:"Ice Cream",price:90,img:"https://images.unsplash.com/photo-1497032205916-ac775f0649ae?auto=format&fit=crop&w=400"},
{name:"Milkshake",price:130,img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=400"},
{name:"Paneer Tikka",price:220,img:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398?auto=format&fit=crop&w=400"},
{name:"French Fries",price:100,img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?auto=format&fit=crop&w=400"},
{name:"Noodles",price:160,img:"https://images.unsplash.com/photo-1585032226651-759b368d7246?auto=format&fit=crop&w=400"},
{name:"Coffee",price:60,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=400"},
{name:"Broccoli Salad",price:140,img:"https://images.unsplash.com/photo-1550304943-4f24f54ddde9?auto=format&fit=crop&w=400"},
{name:"Chocolate Lava Cake",price:120,img:"https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=400"}
];

let cart = {};

function render(){
 let html="";
 menuItems.forEach((item,i)=>{
  html+=`
  <div class="card">
    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/400x300'">
    <div class="card-body">
      <h3>${item.name}</h3>
      <p class="price">₹${item.price}</p>
      <button onclick="add(${i})">Add</button>
    </div>
  </div>`;
 });
 document.getElementById("menu").innerHTML=html;
}

function add(i){
 cart[i]=(cart[i]||0)+1;
 updateCart();
 blinkWand();
}

function updateCart(){
 let total=0,html="";
 for(let i in cart){
  total+=menuItems[i].price*cart[i];
  html+=`<p>${menuItems[i].name} x${cart[i]}</p>`;
 }
 document.getElementById("cartItems").innerHTML=html;
 document.getElementById("total").innerText=total;
 document.getElementById("count").innerText=
  Object.values(cart).reduce((a,b)=>a+b,0);
}

function toggleCart(){
 document.getElementById("cart").classList.toggle("open");
}

function blinkWand(){
 let wand=document.getElementById("wand");
 wand.classList.add("blink");
 setTimeout(()=>wand.classList.remove("blink"),500);
}

render();

</script></body>
</html>
